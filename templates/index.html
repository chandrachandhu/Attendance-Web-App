<!DOCTYPE html>
<html>

<head>

<title>Attendance Generator</title>

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
font-family: Arial, Helvetica, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#111827;
padding:40px;
border-radius:15px;
text-align:center;
width:420px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:14px;
}

button{
padding:12px 30px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.generate{
background:#22c55e;
color:white;
}

.sheet{
background:#3b82f6;
color:white;
margin-bottom:10px;
}

.extract{
background:#f59e0b;
color:white;
margin-bottom:10px;
}

button:hover{
opacity:0.9;
transform:scale(1.05);
}

.status{
margin-top:15px;
font-size:14px;
color:#9ca3af;
}

</style>

<script>

function extractData(){

document.getElementById("status").innerText="Extracting data from sheet...";

fetch("/extract")
.then(res => res.text())
.then(data=>{
document.getElementById("status").innerText=data;
})
.catch(()=>{
document.getElementById("status").innerText="Error extracting data";
})

}

</script>

</head>

<body>

<div class="container">

<h2>Attendance Generator</h2>

<!-- Open Google Sheet -->
<a href="https://docs.google.com/spreadsheets/d/1t1OyQbuq0kD3F9vFpo6c6ScEN-A0UWUGaYQ214qIeXw/edit?usp=sharing" target="_blank">
<button class="sheet">Open Attendance Format</button>
</a>

<br>

<!-- Extract button -->
<button class="extract" onclick="extractData()">Extract Attendance Data</button>

<form action="/generate" method="post" enctype="multipart/form-data">

<input type="text" name="filename"
placeholder="Enter Month Name (Example: March)" required>

<input type="file" name="file" required>

<button class="generate">Generate Attendance</button>

</form>

<div class="status" id="status"></div>

</div>

</body>

</html>
